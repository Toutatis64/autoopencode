# AutoOpencode — Project Configuration
# Generated by setup.sh for generic project

project:
  name: "AutoOpencode"
  description: "The autopilot for opencode"
  type: "python"

validation:
  default: "pytest -x -q"
  typecheck: "mypy ."
  lint: "ruff check ."
  build: "python3 -c 'import py_compile; import sys; sys.exit(0)'"
  full: "ruff check . && mypy . && pytest -x -q"

paths:
  knowledge_base: "knowledge/autopilot_kb.yaml"
  meta_knowledge_base: "knowledge/meta_kb.yaml"
  goal_file: ".opencode/autopilot/goal.md"
  runtime_dir: ".opencode/autopilot/runtime"
  components_dir: ".opencode/autopilot/components"

modules:
  - name: scripts
    keywords: ["scripts", "python"]
  - name: knowledge
    keywords: ["knowledge", "kb", "yaml"]
  - name: templates
    keywords: ["template", "scaffold"]
  - name: tests
    keywords: ["test", "pytest"]
  - name: config
    keywords: ["config", "yaml", "setup"]

project_goals:
  description: "Perpetually improve AutoOpencode. Improve the autopilot to be like a LLM of autocoding: multi-level hierarchies of agent loops."
  principles:
    - "Improve quality, coverage, performance, and architecture"
    - "Add tests for uncovered code"
    - "Fix bugs with regression tests"
    - "Reduce duplication and technical debt"

conventions:
  - "Tests for every fix: regression test that fails before the fix"
  - "One focused validation per edit"
  - "Preserve existing code patterns"


skills:
  paths:
    - ".opencode/skills"
