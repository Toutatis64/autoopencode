  - id: "20260612T133446Z-iter008"
    family: "infrastructure"
    summary: >
      Diagnosed and fixed a long-standing systemic bug: the deploy mirror at
      .opencode/autopilot/ had silently drifted ~1800+ lines from scripts/
      (run_autopilot.py, self_improving_loop.py, kpi.py, meta_autopilot.py).
      Because run_autopilot.sh runs `python3 .opencode/autopilot/run_autopilot.py`,
      the actual executing loop was using a stale copy that lacked the run_cycle
      decomposition, the importlib.reload(scripts.checkpoint) fix, the
      _project_approaches/_project_objectives/_project_architectures helpers, and
      the Memory/Reporting module extractions. In effect, the loop never saw
      recent improvements even though `make test` reported 100% pass.
      Fix: introduced scripts/sync.py (87L) that detects drift (missing/modified/
      extra) and repairs by shutil.copy2-ing source files to the deploy mirror.
      Only .py files are synced — non-py artefacts (goal.md, components/, runtime/)
      are project-owned config and are preserved untouched. Deploy-only .py files
      are also preserved. Wired into the Makefile: `make deploy-sync` (repair),
      `make deploy-check` (CI-friendly check, exit 1 on drift), and `make build`
      now calls deploy-sync first. `make full` now calls deploy-check first so
      any future drift fails the build before the test suite runs.
      Added 23 tests in tests/test_sync.py (98% coverage of scripts/sync.py):
      detect_drift (in-sync, modified, missing, extra, ignores non-py, raises on
      missing dirs), repair_drift (copies, dry-run, preserves extras, copy2
      preserves mtime), sync (returns 0 when in-sync, returns 0 after repair,
      --check returns 1 on drift, --check returns 0 when in-sync, dry-run
      doesn't write), main CLI (parses --source-dir/--deploy-dir/--check, returns
      2 on missing dir), and an end-to-end test against the real repo that
      asserts the deploy mirror is byte-identical to scripts/ after sync.
      Ran `make deploy-sync` once to bring the existing drift in sync. Verified
      all .py files are byte-identical between scripts/ and .opencode/autopilot/
