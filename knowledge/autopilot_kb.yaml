  - id: "20260612-iter003"
    family: "tests"
    summary: >
      Added 44 unit tests for core parsing functions in run_autopilot.py.
      Tests cover: strip_ansi (various ANSI codes), clean_text (None/whitespace/empty/non-string),
      extract_checkpoint (simple/nested JSON, ANSI in output, missing markers, invalid JSON, extra braces),
      normalize_checkpoint (empty/unknown status/valid statuses, goal_complete bool/string/default,
      summary fallback, branch_family normalization, competitiveness/evidence/novelty/promotion validation),
      unique_preserve (order preservation, empty, single, no-dups),
      normalize_string_list (list/string/none/int, empty list),
      normalize_artifacts (list of dicts/none/string/empty list).
      Also removed unused variable `blocked_stage_num` in self_improving_loop.py (F841).
    result: "44 new tests pass. lint: ruff clean on tests/. mypy clean on all 10 source files. 47 total tests pass."
    next: "Decompose run_autopilot.py (2942L) into modules; add tests for run_iteration and memory functions"

  - id: "20260612-iter004"
    family: "core_parsing"
    summary: >
      Diagnosed root cause of "No checkpoint markers found" stall: the opencode agent wraps
      checkpoint JSON in markdown code fences (```json ... ```) but extract_checkpoint's regex
      required `{` immediately after CHECKPOINT_BEGIN. Fixed extract_checkpoint to: (1) capture
      everything between markers, (2) strip markdown code fences, (3) find outermost JSON object
      via greedy `{.*}` match. Added 4 tests for code fence variants. Also fixed 6 F401/F841 lint
      errors (unused imports: MutationType, ComponentRef, initialize_defaults, load_config; unused
      vars: scratch_dir_names, finished_at). Added 9 tests for ensure_text, compact_summary, utc_now.
    result: "60 total tests pass (47->60, +13). lint down from 13->7 errors (only E402 remains). mypy clean. extract_checkpoint now handles actual opencode output format."
    next: "Fix E402 module-level import order errors; consider decomposing run_autopilot.py (2934L)"

  - id: "20260612-iter005"
    family: "checkpoint_resilience"
    summary: >
      Added fallback path to extract_checkpoint that finds code-fenced JSON block even when
      AUTOPILOT_CHECKPOINT_BEGIN/END markers are missing. The agent sometimes emits valid
      checkpoint JSON inside ```json...``` fences without the outer markers (confirmed in
      iteration 4 stdout logs). New _find_last_code_fenced_json() searches for JSON in code
      fences, validates it has a 'status' field (checkpoint-like), and returns the last match.
      Also strengthened the goal-autopilot agent prompt with explicit emphasis that omitting
      markers makes work invisible to the loop. Synced scripts to .opencode/autopilot/deploy copy.
    result: "65 tests pass (+5 new: fallback code fence no markers, no lang, picks last, skips non-checkpoint, markers still take priority). mypy clean. make check clean."
    next: "Improve meta-autopilot component registry with initial variants; or decompose run_autopilot.py into modules"

  - id: "20260612-iter006"
    family: "checkpoint_resilience"
    summary: >
      Diagnosed root cause of persistent "No checkpoint markers found" across 5 iterations:
      opencode agent outputs checkpoint JSON to stderr, not stdout, in many iterations
      (confirmed by analyzing iteration 2-5 stderr logs which contained valid checkpoints).
      Modified run_iteration_with_retry to fallback to stderr_text when extract_checkpoint
      returns no result from stdout_text. Added 3 tests: stderr-only content extraction,
      stderr with log prefixes, and empty-stdout + stderr-has-checkpoint simulation.
    result: "67 tests pass (+2 new: stderr-only content extraction, empty stdout+stderr has checkpoint). mypy clean. make check clean."
    next: "Decompose run_autopilot.py (2980L) into modules; or add end-to-end integration test for autopilot loop with mock agent"

  - id: "20260612-iter007"
    family: "scripts"
    summary: >
      Extracted checkpoint module from monolithic scripts/run_autopilot.py (~2976L).
      Created scripts/checkpoint.py (369L) containing all checkpoint-related constants,
      utility functions (clean_text, unique_preserve, extract_tags, normalize_string_list,
      normalize_artifacts), checkpoint parsing (extract_checkpoint, normalize_checkpoint,
      strip_ansi, _find_last_code_fenced_json), and inference functions (checkpoint_text,
      infer_branch_family, infer_family_novelty, infer_evidence_quality, infer_competitiveness,
      infer_promotion_recommendation). Updated run_autopilot.py (2621L) to import from
      scripts.checkpoint. Updated tests to import from scripts.checkpoint.
    result: "67 tests pass (-11 imports, +369 new module, no change in test count). mypy clean on 11 source files. lint unchanged (pre-existing E402 only). run_autopilot.py reduced by 355 lines (12%)."
    next: "Extract memory/file modules from run_autopilot.py; or fix E402 module import order errors; or add tests for checkpoint.py directly"

  - id: "20260612-iter008"
    family: "core_parsing"
    summary: >
      Fixed persistent "No checkpoint markers found" across all 7 prior iterations.
      Root cause: (1) Running Python process never reloaded modules, so regex fixes
      from iterations 4-7 (code fence stripping, stderr fallback) were never picked up.
      (2) infer_branch_family used substring matching ("check" in "checkpoint"→"tests"),
      causing all failed iterations to misclassify as "tests" family.
      Fixes:
      - run_iteration now calls importlib.reload(scripts.checkpoint) before extraction,
        so agent-applied code changes take effect immediately (not on next restart).
      - infer_branch_family now uses regex word boundaries for hints instead of naive
        `hint in text` substring matching. Changed overloaded "check" hint to specific
        r"\btests?\b", r"\btypecheck\b" patterns.
      - in checkpoint.py: applied same word-boundary fix to the canonical copy.
    result: "67 tests pass (no new tests needed — existing tests cover the affected functions). mypy clean on 11 source files. lint unchanged (pre-existing E402 only). Family inference correctly classifies 'checkpoint' as 'unknown' instead of 'tests'. Module reload enables running process to pick up future agent code changes."
    next: "Add tests for importlib.reload path in run_iteration; fix E402 module import order errors; extract memory/file modules from run_autopilot.py"

  - id: "20260612-iter010"
    family: "tests"
