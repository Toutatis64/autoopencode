      from autocode.yaml and generates project-specific domains. Falls back to hardcoded
      FAMILY_DOMAINS when no config available. Updated _recent_domains() to use the same.
      +2 tests for _project_family_domains. Suite: 600 tests (+2), mypy=pass, ruff=pass.
    result: >
      self_improving_loop.py: hardcoded NestJS/React/MongoDB domains → project-aware domains
